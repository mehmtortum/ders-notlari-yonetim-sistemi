<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ders Notlari Yonetim Sistemi</title>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:grid;place-items:center;background:#f4f7fb;color:#17202a;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px;">
        <div style="width:min(520px,100%);background:white;border:1px solid #d9e2ec;border-radius:8px;padding:24px;box-shadow:0 20px 60px rgba(32,48,74,.12);">
          <p style="margin:0 0 8px;color:#457b9d;font-weight:800;font-size:13px;text-transform:uppercase;">Ders Notlari Yonetim Sistemi</p>
          <h1 style="margin:0 0 10px;font-size:30px;line-height:1.1;">Uygulama yukleniyor</h1>
          <p style="margin:0;color:#52616f;">Bu yazi kaybolmuyorsa JavaScript tarafinda hata vardir. Terminalde frontend acik kalsin ve sayfayi yenileyin.</p>
        </div>
      </div>
    </div>
    <script>
      window.addEventListener('error', function (event) {
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;background:#f4f7fb;color:#17202a;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:24px;"><div style="width:min(640px,100%);background:white;border:1px solid #fecaca;border-radius:8px;padding:24px;"><p style="margin:0 0 8px;color:#b42318;font-weight:800;">Frontend hatasi</p><h1 style="margin:0 0 10px;font-size:28px;">Sayfa acilirken hata olustu</h1><pre style="white-space:pre-wrap;background:#fff5f5;padding:12px;border-radius:6px;overflow:auto;">' + String(event.message || 'Bilinmeyen hata') + '</pre></div></div>';
      });
      window.addEventListener('unhandledrejection', function (event) {
        var root = document.getElementById('root');
        if (!root) return;
        var message = event.reason && event.reason.message ? event.reason.message : event.reason;
        root.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;background:#f4f7fb;color:#17202a;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:24px;"><div style="width:min(640px,100%);background:white;border:1px solid #fecaca;border-radius:8px;padding:24px;"><p style="margin:0 0 8px;color:#b42318;font-weight:800;">Baglanti hatasi</p><h1 style="margin:0 0 10px;font-size:28px;">API cevabi alinamadi</h1><pre style="white-space:pre-wrap;background:#fff5f5;padding:12px;border-radius:6px;overflow:auto;">' + String(message || 'Bilinmeyen hata') + '</pre></div></div>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
